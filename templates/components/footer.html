<footer class="site-footer">
    <div class="container footer-row">
        <p>&copy; {{ current_year }} Hệ thống NEU Smart Parking</p>
        <div class="footer-links">
            <a href="{{ url_for('index') }}">Trang chủ</a>
            {% if current_user and current_user.role in ['admin', 'guard'] %}
                <a href="{{ url_for('history') }}">Lịch sử</a>
                <a href="{{ url_for('dashboard') }}">Tổng quan</a>
            {% elif current_user and current_user.role == 'student' %}
                <a href="{{ url_for('self_history') }}">Lịch sử</a>
                <a href="{{ url_for('student_qr') }}">Mã QR</a>
            {% else %}
                <a href="{{ url_for('login') }}">Đăng nhập</a>
                <a href="{{ url_for('register') }}">Đăng ký</a>
            {% endif %}
        </div>
    </div>
</footer>
