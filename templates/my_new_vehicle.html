<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký xe mới</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Inter, sans-serif;
            background: #f5f7fb;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        h2 {
            margin-bottom: 10px;
        }

        .desc {
            color: #666;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .row {
            display: flex;
            gap: 20px;
        }

        .row .form-group {
            flex: 1;
        }

        .upload-box {
            border: 2px dashed #ccc;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            color: #777;
        }

        .btn-group {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: #4f46e5;
            color: white;
        }

        .btn-secondary {
            background: #eee;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Đăng ký xe mới</h2>
    <p class="desc">Điền thông tin để gửi yêu cầu đăng ký xe vào trường</p>

    <form method="POST" action="/vehicles/create" enctype="multipart/form-data">

        <!-- Biển số -->
        <div class="form-group">
            <label>Biển số xe</label>
            <input type="text" name="license_plate" placeholder="VD: 29A-123.45" required>
        </div>

        <!-- Loại xe + Màu -->
        <div class="row">
            <div class="form-group">
                <label>Loại xe</label>
                <select name="vehicle_type">
                    <option value="motorbike">Xe máy</option>
                    <option value="car">Ô tô</option>
                    <option value="electric">Xe điện</option>
                </select>
            </div>

            <div class="form-group">
                <label>Màu xe</label>
                <input type="text" name="color" placeholder="VD: Đen, Trắng">
            </div>
        </div>

        <!-- Hãng xe -->
        <div class="form-group">
            <label>Hãng xe</label>
            <input type="text" name="brand" placeholder="Honda, Toyota...">
        </div>

        <!-- MSSV -->
        <div class="form-group">
            <label>Mã sinh viên</label>
            <input type="text" name="student_id" required>
        </div>

        <!-- Tên -->
        <div class="form-group">
            <label>Họ tên chủ xe</label>
            <input type="text" name="owner_name" required>
        </div>

        <!-- Upload -->
        <div class="form-group">
            <label>Ảnh đăng ký xe (Cavet)</label>
            <input type="file" name="vehicle_image" accept="image/*">
        </div>

        <div class="form-group">
            <label>Ảnh CCCD / Thẻ sinh viên</label>
            <input type="file" name="identity_image" accept="image/*">
        </div>

        <!-- Button -->
        <div class="btn-group">
            <button type="reset" class="btn btn-secondary">Lưu nháp</button>
            <button type="submit" class="btn btn-primary">Gửi yêu cầu</button>
        </div>

    </form>
</div>

</body>
</html>
