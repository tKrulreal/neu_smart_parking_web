{% extends 'base.html' %}

{% block title %}Đăng nhập{% endblock %}

{% block content %}

<div class="vehicles-container1">

  <div class="vehicles-thq-main-login-container-elm">

    <!-- LEFT -->
    <div class="vehicles-thq-section-left-side-visual-branding-elm">
      <h2>NEU Smart Parking</h2>
      <h1>Chào mừng bạn quay trở lại</h1>
      <p>Hệ thống quản lý bãi xe thông minh</p>
    </div>

    <!-- RIGHT -->
    <div class="vehicles-thq-section-right-side-login-form-elm">

      <form method="POST" action="{{ url_for('login') }}">

        <!-- ROLE -->
        <div>
          <label>Vai trò</label>
          <select name="role" required>
            <option value="admin">Quản trị</option>
            <option value="guard">Bảo vệ</option>
            <option value="student">Sinh viên</option>
          </select>
        </div>

        <!-- USERNAME -->
        <div>
          <label>Email / Username</label>
          <input 
            type="text" 
            name="username" 
            placeholder="nguyenvana@neu.edu.vn"
            required
          >
        </div>

        <!-- PASSWORD -->
        <div>
          <label>Mật khẩu</label>
          <input 
            type="password" 
            name="password" 
            placeholder="••••••••"
            required
          >
        </div>

        <!-- REMEMBER -->
        <div>
          <input type="checkbox" name="remember">
          <label>Ghi nhớ đăng nhập</label>
        </div>

        <!-- BUTTON -->
        <button type="submit">
          Đăng nhập
        </button>

      </form>

      <!-- ERROR -->
      {% if error %}
        <p style="color:red">{{ error }}</p>
      {% endif %}

      <!-- REGISTER -->
      <p>
        Chưa có tài khoản?
        <a href="{{ url_for('register') }}">Đăng ký</a>
      </p>

    </div>

  </div>

</div>

{% endblock %}
