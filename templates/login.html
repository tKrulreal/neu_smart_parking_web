{% extends 'base.html' %}

{% block title %}Đăng nhập - NEU Smart Parking{% endblock %}

{% block content %}
<div class="auth-shell">
    <div class="auth-panel">
        <div class="auth-logo">
            <div class="auth-logo-icon">🅿</div>
            <span class="auth-logo-name">NEU Smart Parking</span>
        </div>
        <h1 class="page-title">Đăng nhập</h1>
        <p class="muted">Nhập tài khoản để truy cập hệ thống.</p>
        <form method="post" action="{{ url_for('login', next=request.args.get('next')) }}" class="form-grid" style="margin-top:20px;">
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input id="username" name="username" type="text" required value="{{ username or '' }}" placeholder="Nhập tên đăng nhập">
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input id="password" name="password" type="password" required placeholder="Nhập mật khẩu">
            </div>
            <button class="btn btn-primary" type="submit" style="width:100%;padding:11px;">Đăng nhập</button>
        </form>
        <p class="auth-footer">Chưa có tài khoản? <a href="{{ url_for('register') }}">Đăng ký ngay</a></p>
    </div>
</div>
{% endblock %}
