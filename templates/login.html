{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>Đăng nhập</h2>
    <form method="post">
        <label>Username</label>
        <input name="username" value="{{ username or '' }}" autocomplete="username" required>

        <label>Mật khẩu</label>
        <input type="password" name="password" autocomplete="current-password" required>

        <button type="submit">Đăng nhập</button>
    </form>
    <p class="muted">Chưa có tài khoản? <a href="{{ url_for('register') }}">Đăng ký</a></p>
</div>
{% endblock %}
